{% extends "Base.html" %}

{% block title %}
Delete Post
{% endblock %}

{% block content %}
<h1>Delete Post</h1>
<p>Are you sure you want to delete this post?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'post_list' %}" class="btn btn-success">Cancel</a>
</form>
{% endblock %}
