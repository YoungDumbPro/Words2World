{% extends "base.html" %}

{% block title %}
Posts - Words2World
{% endblock %}

{% block content %}
<h1>{% if form.instance.pk %}Edit Post{% else %}Create Post{% endif %}</h1>

<form method="post" enctype="multipart/form-data" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% if form.instance.pk %}Update{% else %}Create{% endif %}</button>
    </form>
    <a href="{% url 'post_list' %}" class="btn btn-secondary mt-2">Back to Posts</a>
</h2>

{% endblock %}
